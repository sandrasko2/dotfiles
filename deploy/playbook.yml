---
- name: Deploy dotfiles to LAN machines
  hosts: all
  gather_facts: false

  vars:
    dotfiles_src: "{{ playbook_dir }}/.."
    dotfiles_dest: "/vault/dotfiles"
    dotfiles:
      - .bashrc
      - .bash_aliases
      - .inputrc
      - .vimrc
      - .tmux.conf
      - .gitconfig

  tasks:
    - name: Ensure dotfiles directory exists
      ansible.builtin.file:
        path: "{{ dotfiles_dest }}"
        state: directory
        mode: "0755"

    - name: Sync dotfiles to target
      ansible.builtin.copy:
        src: "{{ dotfiles_src }}/{{ item }}"
        dest: "{{ dotfiles_dest }}/{{ item }}"
        mode: "0644"
      loop: "{{ dotfiles }}"

    - name: Sync install script
      ansible.builtin.copy:
        src: "{{ dotfiles_src }}/install.sh"
        dest: "{{ dotfiles_dest }}/install.sh"
        mode: "0755"

    - name: Run install script
      ansible.builtin.command:
        cmd: bash {{ dotfiles_dest }}/install.sh
      register: install_result
      changed_when: "'→' in install_result.stdout"

    - name: Show install output
      ansible.builtin.debug:
        var: install_result.stdout_lines
