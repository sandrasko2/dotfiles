# ~/.config/starship.toml — managed by /vault/dotfiles

format = """
$directory\
$git_branch\
$git_status\
$python\
$docker_context\
$terraform\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 0
truncate_to_repo = false
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"

[python]
symbol = " "
style = "bold yellow"
format = '[${symbol}${version}]($style) '
detect_files = ["pyproject.toml", ".python-version"]
detect_extensions = []
detect_folders = []

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
detect_files = ["compose.yml", "compose.yaml", "docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[terraform]
symbol = "󱁢 "
style = "bold magenta"
format = "[$symbol$workspace]($style) "

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[ $duration]($style) "

[kubernetes]
disabled = true

[battery]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
