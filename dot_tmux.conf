# ~/.tmux.conf — tmux configuration with TPM

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # True color support
set -g history-limit 50000
set -g base-index 1                         # Windows start at 1
setw -g pane-base-index 1                   # Panes start at 1
set -g renumber-windows on                  # Renumber on close
set -sg escape-time 0                       # No delay for vim
set -g focus-events on                      # For vim autoread
set -g mouse on                             # Mouse support

# ---------------------------------------------------------------------------
# Splits — intuitive keys, preserve working directory
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# Pane navigation — vim-style
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing — Shift+vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Window navigation
# ---------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ---------------------------------------------------------------------------
# Copy mode — vi keybindings
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y run-shell -b "tmux save-buffer - | xclip -selection clipboard -i" \; send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane run-shell -b "tmux save-buffer - | xclip -selection clipboard -i" \; send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Reload config
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour0,bg=colour6,bold] #S #[fg=colour6,bg=colour235] "
set -g status-left-length 30
set -g status-right "#[fg=colour248]#H  %Y-%m-%d  %H:%M "
set -g status-right-length 50

# Active window
setw -g window-status-current-style "fg=colour0,bg=colour6,bold"
setw -g window-status-current-format " #I:#W "

# Inactive windows
setw -g window-status-style "fg=colour248,bg=colour235"
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour6"

# ---------------------------------------------------------------------------
# TPM — Tmux Plugin Manager
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
