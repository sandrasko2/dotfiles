# ~/.config/alacritty/alacritty.toml — Dracula theme, Nerd Font, tmux-friendly

[env]
TERM = "alacritty"

[window]
padding = { x = 4, y = 4 }
dynamic_padding = true
decorations = "Full"

[scrolling]
history = 10000

# ---------------------------------------------------------------------------
# Font — Nerd Font for eza icons and starship glyphs
# ---------------------------------------------------------------------------
[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

# ---------------------------------------------------------------------------
# Dracula color palette — ANSI 0-15 + fg/bg/cursor
# ---------------------------------------------------------------------------
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"

[colors.cursor]
cursor = "#f8f8f2"
text = "#282a36"

[colors.selection]
background = "#44475a"
text = "#f8f8f2"

[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"

# ---------------------------------------------------------------------------
# Keyboard — no bindings that conflict with tmux
# ---------------------------------------------------------------------------
[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "CreateNewWindow"

# Prev/next tmux window
# Mac: Cmd+Shift+{ / Cmd+Shift+}   Linux: Ctrl+Shift+{ / Ctrl+Shift+}
[[keyboard.bindings]]
key = "LeftBracket"
mods = "Super|Shift"
chars = "\u0001p"

[[keyboard.bindings]]
key = "RightBracket"
mods = "Super|Shift"
chars = "\u0001n"

[[keyboard.bindings]]
key = "LeftBracket"
mods = "Control|Shift"
chars = "\u0001p"

[[keyboard.bindings]]
key = "RightBracket"
mods = "Control|Shift"
chars = "\u0001n"
